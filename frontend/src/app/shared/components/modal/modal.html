@if (open()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-ink/40 p-4 backdrop-blur-sm"
    (mousedown)="onOverlayMouseDown($event)"
    (mouseup)="onOverlayMouseUp($event)"
  >
    <div
      class="w-full max-w-lg overflow-hidden rounded-2xl border border-line bg-surface shadow-xl"
    >
      <header class="flex items-center justify-between border-b border-line px-5 py-4">
        <h2 class="text-lg font-semibold text-ink">{{ title() }}</h2>
        <button
          type="button"
          (click)="onClose()"
          aria-label="Cerrar"
          class="rounded-md p-1 text-muted transition hover:bg-canvas hover:text-ink focus:outline-none focus-visible:ring-2 focus-visible:ring-brand"
        >
          <span class="block h-5 w-5 text-center text-lg leading-5">&times;</span>
        </button>
      </header>

      <div class="px-5 py-5">
        <ng-content />
      </div>
    </div>
  </div>
}
