@if (notification(); as n) {
  <div
    role="alert"
    aria-live="assertive"
    class="toast-enter fixed right-4 top-4 z-[100] flex max-w-sm items-start gap-3 rounded-xl border px-4 py-3 shadow-lg"
    [class.border-green-200]="n.type === 'success'"
    [class.bg-green-50]="n.type === 'success'"
    [class.text-green-800]="n.type === 'success'"
    [class.border-red-200]="n.type === 'error'"
    [class.bg-red-50]="n.type === 'error'"
    [class.text-red-800]="n.type === 'error'"
  >
    <!-- icono según el tipo -->
    <span class="mt-0.5 flex h-5 w-5 shrink-0 items-center justify-center">
      @if (n.type === 'success') {
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5">
          <path
            fill-rule="evenodd"
            d="M16.7 5.3a1 1 0 0 1 0 1.4l-7.5 7.5a1 1 0 0 1-1.4 0L3.3 9.7a1 1 0 1 1 1.4-1.4l3.1 3.1 6.8-6.8a1 1 0 0 1 1.4 0Z"
            clip-rule="evenodd"
          />
        </svg>
      } @else {
        <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5">
          <path
            fill-rule="evenodd"
            d="M10 1.8 1 17.5h18L10 1.8Zm0 5.2a1 1 0 0 1 1 1v3a1 1 0 1 1-2 0v-3a1 1 0 0 1 1-1Zm0 8a1.1 1.1 0 1 1 0-2.2 1.1 1.1 0 0 1 0 2.2Z"
            clip-rule="evenodd"
          />
        </svg>
      }
    </span>

    <p class="flex-1 text-sm font-medium">{{ n.message }}</p>

    <button
      type="button"
      (click)="close()"
      aria-label="Cerrar notificación"
      class="-mr-1 ml-1 shrink-0 rounded-md p-0.5 text-current/60 transition hover:bg-black/5 hover:text-current"
    >
      <span class="block h-4 w-4 text-center text-base leading-4">&times;</span>
    </button>
  </div>
}
