<app-modal [open]="open()" [title]="title()" (close)="onClose()">
  <p class="text-sm leading-relaxed text-slate-600">{{ message() }}</p>

  <div class="mt-6 flex items-center justify-end gap-2">
    <button
      type="button"
      (click)="cancel.emit()"
      class="rounded-lg px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100"
    >
      {{ cancelText() }}
    </button>
    <button
      type="button"
      (click)="confirm.emit()"
      class="rounded-lg px-4 py-2 text-sm font-medium text-white transition"
      [class.bg-red-600]="danger()"
      [class.hover:bg-red-500]="danger()"
      [class.bg-slate-900]="!danger()"
      [class.hover:bg-slate-700]="!danger()"
    >
      {{ confirmText() }}
    </button>
  </div>
</app-modal>
