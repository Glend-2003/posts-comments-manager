@if (comments().length === 0) {
  <div class="rounded-xl border border-dashed border-slate-300 bg-white py-10 text-center">
    <p class="text-sm font-medium text-slate-600">Aún no hay comentarios</p>
    <p class="mt-1 text-sm text-slate-400">Sé el primero en comentar.</p>
  </div>
} @else {
  <ul class="space-y-3">
    @for (comment of comments(); track comment._id) {
      <li class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm font-semibold text-slate-800">{{ comment.name }}</p>
            <p class="text-xs text-slate-400">{{ comment.email }}</p>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs text-slate-400">{{ comment.createdAt | date: 'dd MMM yyyy, HH:mm' }}</span>
            <button
              type="button"
              (click)="delete.emit(comment)"
              class="rounded-md px-2 py-1 text-xs font-medium text-red-600 transition hover:bg-red-50"
            >
              Eliminar
            </button>
          </div>
        </div>
        <p class="mt-2 text-sm text-slate-600">{{ comment.body }}</p>
      </li>
    }
  </ul>
}
